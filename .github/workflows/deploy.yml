name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Railway Token File
        run: |
          mkdir -p ~/.railway
          echo 'OHYZq6OTEdcgCqLul0pFyaHxI12ExeLk0dc-9YbE6g5' > ~/.railway/token
          
      - name: Install Railway CLI
        run: npm install -g @railway/cli
        
      - name: Railway Deploy
        run: |
          railway whoami || echo "Token check"
          railway up --service 貓保母 --yes --json
